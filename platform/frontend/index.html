      (() => {
        const fallback = "/worldcup_icon.webp";

        if (!favicon) return;
        const test = new Image();
        test.onload = () => {};
        test.onerror = () => {

        };
        test.src = favicon.getAttribute("href") || fallback;
      })();
    </script>
